services:
  - type: web
    name: kaonaa-erp-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter backend prisma:generate && pnpm --filter backend build
    startCommand: pnpm --filter backend prisma:deploy && pnpm --filter backend start
    envVars:
      - key: NODE_VERSION
        value: 22.22.2
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_OCR_MODEL
        value: claude-sonnet-5
      - key: CEO_APPROVAL_THRESHOLD_THB
        value: "50000"
      - key: DOCUMENTS_STORAGE_PATH
        value: ./uploads
      - key: FRONTEND_URL
        sync: false
